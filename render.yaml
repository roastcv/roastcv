services:
  - type: web
    name: roastcv
    runtime: python
    buildCommand: pip install -r requirements.txt && python patch_streamlit_html.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.maxUploadSize 5 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0